---
name: nookbag-sidecar-image-publish
on:
  push:
    paths:
      - healthz/**
    tags:
      - nookbag-sidecar-v*
  pull_request:
    paths:
      - healthz/**
jobs:
  build:
    runs-on: ubuntu-24.04
    outputs:
      image-tags: ${{ steps.meta.outputs.tags }}
      image-labels: ${{ steps.meta.outputs.labels }}
      image-digest: ${{ steps.build.outputs.digest }}
      should-push: ${{ steps.should-push.outputs.result }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: quay.io/rhpds/nookbag-sidecar
          tags: |
            type=match,pattern=nookbag-sidecar-v(\d+\.\d+\.\d+),group=1,prefix=v
            type=match,pattern=nookbag-sidecar-v(\d+\.\d+)\.\d+,group=1,prefix=v
            type=match,pattern=nookbag-sidecar-v(\d+)\.\d+\.\d+,group=1,prefix=v
            type=sha,enable={{is_default_branch}}
            type=ref,event=pr,prefix=pr-
          flavor: |
            latest=false

      - name: Determine if we should push
        id: should-push
        run: |
          if [[ "${{ steps.meta.outputs.tags }}" != "" && "${{ github.event_name }}" != "pull_request" ]]; then
            echo "result=true" >> $GITHUB_OUTPUT
          else
            echo "result=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: healthz
          file: ./healthz/Containerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: ${{ steps.should-push.outputs.result == 'true' && 'type=docker,dest=/tmp/nookbag-sidecar-image.tar' || 'type=docker' }}

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        if: steps.should-push.outputs.result == 'true'
        with:
          name: nookbag-sidecar-image
          path: /tmp/nookbag-sidecar-image.tar
          retention-days: 1

  push:
    runs-on: ubuntu-24.04
    needs: build
    if: needs.build.outputs.should-push == 'true'
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: nookbag-sidecar-image
          path: /tmp

      - name: Load image
        run: |
          docker load --input /tmp/nookbag-sidecar-image.tar

      - name: Login to quay.io registry
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_IO_RHPDS_USERNAME }}
          password: ${{ secrets.QUAY_IO_RHPDS_TOKEN }}

      - name: Push image to registry
        run: |
          TAGS="${{ needs.build.outputs.image-tags }}"
          echo "$TAGS" | while IFS= read -r tag; do
            tag=$(echo "$tag" | xargs)
            [ -n "$tag" ] && docker push "$tag"
          done

      - name: Prepare release metadata (only for tags)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          DIGEST="${{ needs.build.outputs.image-digest }}"
          {
            echo "TAG=${TAG_NAME}"
            echo "DIGEST=${DIGEST}"
            echo "TAGS_START"
            echo "${{ needs.build.outputs.image-tags }}"
            echo "TAGS_END"
          } > /tmp/release-metadata.txt

      - name: Upload release metadata artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata-nookbag-sidecar
          path: /tmp/release-metadata.txt
          retention-days: 7
